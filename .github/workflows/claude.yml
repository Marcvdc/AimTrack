name: Claude Code Agent

on:
  issues:
    types: [opened, assigned, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, ready_for_review]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-agent:
    name: Claude Code Agent
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude') || contains(github.event.pull_request.body, '@claude') || (github.event_name == 'pull_request_review_comment' && contains(github.event.review.body, '@claude'))
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare storage directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          chmod -R 775 storage/framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite, pdo_sqlite, intl, mbstring, bcmath, pcntl, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Ensure SQLite database file
        run: php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a Claude Code GitHub automation agent for the AimTrack project (Laravel + Filament). Your job is to read the current GitHub event (issue, issue comment, PR, or PR review comment), understand the requested change, and implement it directly in the repository.

            When triggered from an issue:
            - Read the issue title and body carefully.
            - Plan the implementation in small, coherent steps.
            - Create a new branch based on the default branch.
            - Implement the change in the codebase, following the coding standards from CLAUDE.md.
            - Add or update tests as needed to cover the new behavior.
            - Run or add any relevant test commands if they are documented in the project.
            - Open a pull request that:
              - Clearly summarizes the change.
              - Links back to the issue using "Closes #<issue-number>".
              - Mentions any trade-offs or follow-ups if relevant.

            When triggered from a PR comment or review comment:
            - Interpret the comment as a request to refine or adjust the existing PR.
            - Update the code on the same branch instead of creating a new one.
            - Keep changes incremental and focused on the comment.
            - If the requested change is unclear, make a reasonable assumption and explain it briefly in the PR description or a follow-up comment.
            - Add comments to the PR explaining the changes made.

            When triggered from a PR body:
            - Check if the PR needs adjustments or improvements based on @claude requests.
            - Make the requested changes directly in the PR branch.
            - Update the PR description with changes made.

            General rules:
            - Prefer small, composable changes over large refactors.
            - Maintain existing architectural patterns and naming conventions.
            - Do not introduce breaking changes without explicit instruction.
            - Never commit secrets or credentials.
            - If you encounter ambiguity or missing information, choose a safe default and leave a clear note in the PR description.
            - Always add progress comments to keep users informed.

            Project context:
            - AimTrack is een moderne AI-gedreven schietlogapp voor sportschutters
            - Stack: PHP 8.4, Laravel 12, Filament 4, Livewire 3, PostgreSQL/MySQL
            - Testing: Pest 4 for unit and feature tests
            - Code style: PSR-12, Laravel Pint for formatting
            - All changes must be tested and pass CI pipeline
            - Use Dutch for user-facing text, English for code comments
          claude_args: |
            --max-turns 10 
            --allowedTools mcp__github__create_pull_request,mcp__github__create_comment,mcp__github__update_issue
            --model claude-sonnet-4.1

      - name: Update Issue Status
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        run: |
          echo "🤖 Claude Code Agent processing completed for issue #${{ github.event.issue.number }}"
          echo "📋 Check the Actions tab for detailed logs"

      - name: Update PR Status  
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review_comment'
        run: |
          echo "🤖 Claude Code Agent processing completed for PR #${{ github.event.pull_request.number }}"
          echo "📋 Check the Actions tab for detailed logs"
