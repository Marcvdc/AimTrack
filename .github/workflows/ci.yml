name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare storage directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          chmod -R 775 storage/framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite, pdo_sqlite, intl, mbstring, bcmath, pcntl, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

  test:
    name: Tests (Pest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare storage directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          chmod -R 775 storage/framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite, pdo_sqlite, intl, mbstring, bcmath, pcntl, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Ensure SQLite database file
        run: php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run Pest
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: vendor/bin/pest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare storage directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          chmod -R 775 storage/framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, mbstring, bcmath, pcntl, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.4-composer-

      - name: Install dependencies (no dev for build check)
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Setup Node
        if: hashFiles('**/package-lock.json') != '' || hashFiles('**/pnpm-lock.yaml') != '' || hashFiles('**/yarn.lock') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            **/package-lock.json
            **/pnpm-lock.yaml
            **/yarn.lock

      - name: Install Node dependencies
        if: hashFiles('**/package-lock.json') != '' || hashFiles('**/pnpm-lock.yaml') != '' || hashFiles('**/yarn.lock') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          fi

      - name: Build assets
        if: hashFiles('**/package-lock.json') != '' || hashFiles('**/pnpm-lock.yaml') != '' || hashFiles('**/yarn.lock') != ''
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          provenance: false
          build-args: |
            PHP_VERSION=8.4
          tags: aimtrack:ci-${{ github.sha }}
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

  deploy-production:
    name: Deploy - Production
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare variables
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "registry_image=ghcr.io/${OWNER}/aimtrack" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=8.4
            APP_ENV=production
          tags: |
            ${{ steps.vars.outputs.registry_image }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.registry_image }}:prod-latest
          cache-from: type=gha,scope=deploy-production
          cache-to: type=gha,mode=max,scope=deploy-production

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: Start WireGuard tunnel
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG }}
        run: |
          umask 077
          echo "${WG_CONFIG}" > /tmp/wg0.conf
          sudo wg-quick up /tmp/wg0.conf

      - name: Verify WireGuard tunnel
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: ping -c 2 "${SSH_HOST}"

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "${PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

      - name: Sync deployment assets
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -p "${PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -avz -e "ssh -p ${PORT}" docker/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/docker/"
          rsync -avz -e "ssh -p ${PORT}" scripts/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/scripts/"

      - name: Upload environment file (optional)
        if: ${{ env.ENV_FILE_B64 != '' }}
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          echo "${ENV_FILE_B64}" | base64 --decode > /tmp/env.production
          scp -P "${PORT}" /tmp/env.production "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/.env"

      - name: Remote deploy
        env:
          REGISTRY_IMAGE: ${{ steps.vars.outputs.registry_image }}
          IMAGE_TAG: ${{ steps.vars.outputs.short_sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "\
            cd '${DEPLOY_PATH}' && \
            REGISTRY_IMAGE='${REGISTRY_IMAGE}' \
            IMAGE_TAG='${IMAGE_TAG}' \
            APP_URL='${APP_URL}' \
            GHCR_USERNAME='${GHCR_USERNAME}' \
            GHCR_TOKEN='${GHCR_TOKEN}' \
            ENV_FILE_B64='${ENV_FILE_B64}' \
            COMPOSE_FILE='docker/compose.prod.yml' \
            bash scripts/remote_deploy.sh"

      - name: Teardown WireGuard tunnel
        if: always()
        run: |
          if [ -f /tmp/wg0.conf ]; then
            sudo wg-quick down /tmp/wg0.conf
            rm -f /tmp/wg0.conf
          fi
