version: "3.9"

services:
  app:
    user: "${UID}:${GID}"
    build:
      context: .
      target: dev
    container_name: aimtrack_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      APP_FORCE_HTTPS: "false"
      TRUSTED_PROXIES: 172.16.0.0/12,127.0.0.1/32
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: aimtrack
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      QUEUE_CONNECTION: database
      IMAGE_PROCESSOR_URL: http://python-service:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aimtrack

  web:
    image: nginx:stable-alpine
    container_name: aimtrack_web
    restart: unless-stopped
    ports:
      - "18081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - aimtrack

  db:
    image: postgres:16
    container_name: aimtrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aimtrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    #dont expost port 5432
    #ports:
    #  - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aimtrack

  queue:
    user: "${UID}:${GID}"
    build:
      context: .
      target: dev
    container_name: aimtrack_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --backoff=5
    volumes:
      - ./:/var/www/html
    environment:
      APP_FORCE_HTTPS: "false"
      TRUSTED_PROXIES: 172.16.0.0/12,127.0.0.1/32
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: aimtrack
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      QUEUE_CONNECTION: database
      IMAGE_PROCESSOR_URL: http://python-service:8000
    depends_on:
      - db
      - python-service
    networks:
      - aimtrack

  mailpit:
    image: axllent/mailpit:latest
    container_name: aimtrack_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - aimtrack

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: aimtrack_python_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./python-service:/app
    depends_on:
      - db
    networks:
      - aimtrack

volumes:
  db_data:
    external: true
    name: aimtrack_db_data

networks:
  aimtrack:
    driver: bridge

# Gebruik:
#   Start stack: docker compose up -d
#   Key: docker compose exec app php artisan key:generate
#   Migraties: docker compose exec app php artisan migrate
